<div class="profile-container" *ngIf="editData">
  <p-toast></p-toast>

  <p-card class="profile-card">
    <div class="profile-header">
      <div class="avatar"><i class="pi pi-user"></i></div>
      <h1>Perfil de usuario</h1>
      <button pButton [label]="isEditMode ? 'Cancelar' : 'Editar'" [icon]="isEditMode ? 'pi pi-times' : 'pi pi-pencil'" (click)="toggleEditMode()"></button>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Nombre</label>
        <input pInputText [(ngModel)]="editData.name" [disabled]="!isEditMode" />
      </div>
      <div class="form-group">
        <label>Usuario</label>
        <input pInputText [(ngModel)]="editData.username" [disabled]="!isEditMode" />
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Email</label>
        <input pInputText [(ngModel)]="editData.email" [disabled]="!isEditMode" />
      </div>
      <div class="form-group">
        <label>Telefono</label>
        <input pInputText [(ngModel)]="editData.phone" [disabled]="!isEditMode" />
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Fecha nacimiento</label>
        <input pInputText type="date" [(ngModel)]="editData.birthDate" [disabled]="!isEditMode" />
      </div>
      <div class="form-group">
        <label>Direccion</label>
        <input pInputText [(ngModel)]="editData.address" [disabled]="!isEditMode" />
      </div>
    </div>

    <div class="action-buttons" *ngIf="isEditMode">
      <button pButton label="Guardar" icon="pi pi-check" (click)="saveProfile()"></button>
    </div>
  </p-card>

  <p-card>
    <h3>Resumen de carga</h3>
    <div class="stats-grid">
      <div>Abiertos: {{ countByStatus('Pendiente') + countByStatus('Bloqueado') }}</div>
      <div>En progreso: {{ countByStatus('En progreso') }}</div>
      <div>Hechos: {{ countByStatus('Hecho') }}</div>
    </div>

    <h4 class="mt-3">Tickets asignados / creados</h4>
    <div class="ticket-row" *ngFor="let ticket of assignedTickets">
      <span>{{ ticket.id }} - {{ ticket.title }}</span>
      <span>{{ ticket.status }}</span>
    </div>
  </p-card>
</div>
