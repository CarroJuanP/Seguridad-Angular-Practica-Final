<div class="profile-container">
  <p-toast></p-toast>

  <p-card class="profile-card">
    <div class="profile-header">
      <div class="avatar">
        <i class="pi pi-user-edit"></i>
      </div>
      <h1>Mi Perfil</h1>
      <button
        pButton
        [label]="isEditMode ? 'Cancelar' : 'Editar'"
        [icon]="isEditMode ? 'pi pi-times' : 'pi pi-pencil'"
        (click)="isEditMode ? cancel() : toggleEditMode()"
        [class.p-button-primary]="!isEditMode"
        [class.p-button-secondary]="isEditMode"
      ></button>
    </div>

    <div class="profile-content">
      <div class="form-row">
        <div class="form-group">
          <label>Nombre Completo:</label>
          <input
            pInputText
            [(ngModel)]="editData.nombreCompleto"
            [disabled]="!isEditMode"
            class="form-input"
          />
        </div>
        <div class="form-group">
          <label>Usuario:</label>
          <input
            pInputText
            [(ngModel)]="editData.usuario"
            [disabled]="!isEditMode"
            class="form-input"
          />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Email:</label>
          <input
            pInputText
            [(ngModel)]="editData.email"
            [disabled]="!isEditMode"
            class="form-input"
          />
        </div>
        <div class="form-group">
          <label>Teléfono:</label>
          <input
            pInputText
            [(ngModel)]="editData.telefono"
            [disabled]="!isEditMode"
            class="form-input"
          />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Fecha de Nacimiento:</label>
          <input
            pInputText
            [(ngModel)]="editData.fechaNacimiento"
            type="date"
            [disabled]="!isEditMode"
            class="form-input"
          />
        </div>
        <div class="form-group">
          <label>Dirección:</label>
          <input
            pInputText
            [(ngModel)]="editData.direccion"
            [disabled]="!isEditMode"
            class="form-input"
          />
        </div>
      </div>

      <div *ngIf="isEditMode" class="action-buttons">
        <button
          pButton
          type="button"
          label="Guardar"
          icon="pi pi-check"
          (click)="saveProfile()"
          class="p-button-primary"
        ></button>
        <button
          pButton
          type="button"
          label="Cancelar"
          icon="pi pi-times"
          (click)="cancel()"
          class="p-button-secondary"
          style="margin-left: 0.5rem"
        ></button>
      </div>
    </div>
  </p-card>
</div>
