<div class="groups-container">
  <p-toast></p-toast>

  <p-card styleClass="mb-4">
    <h2 class="m-0">Seleccion de grupo / espacio</h2>
    <p class="mt-2">Despues de iniciar sesion, elige un grupo para entrar al dashboard.</p>
  </p-card>

  <p-table [value]="groups" [paginator]="true" [rows]="8" responsiveLayout="scroll">
    <ng-template pTemplate="header">
      <tr>
        <th scope="col">Grupo</th>
        <th scope="col">Perfil</th>
        <th scope="col">Descripcion</th>
        <th scope="col">Acciones</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-group>
      <tr [class.row-active]="selectedGroupId === group.id">
        <td>{{ group.name }}</td>
        <td>
          <span
            class="p-tag"
            [style.background]="group.llmColor"
            style="color: #fff; border-radius: 999px; padding: 0.2rem 0.6rem; font-weight: 600"
          >
            {{ group.llmModel }}
          </span>
        </td>
        <td>{{ group.description }}</td>
        <td class="actions">
          <button pButton label="Entrar" icon="pi pi-arrow-right" class="p-button-sm" (click)="selectGroup(group)"></button>

          <button
            *ifHasPermission="$any('group:edit')"
            pButton
            icon="pi pi-users"
            class="p-button-rounded p-button-info p-button-text"
            (click)="manageMembers(group)"
          ></button>

          <button
            *ifHasPermission="$any('group:edit')"
            pButton
            icon="pi pi-pencil"
            class="p-button-rounded p-button-warning p-button-text"
            (click)="editGroup(group)"
          ></button>

          <button
            *ifHasPermission="$any('group:delete')"
            pButton
            icon="pi pi-trash"
            class="p-button-rounded p-button-danger p-button-text"
            (click)="deleteGroup(group)"
          ></button>
        </td>
      </tr>
    </ng-template>
  </p-table>

  <div class="mt-3" *ifHasPermission="$any('group:add')">
    <button pButton type="button" icon="pi pi-plus" label="Nuevo grupo" (click)="openNew()"></button>
  </div>

  <p-dialog [(visible)]="displayDialog" [header]="isNew ? 'Nuevo grupo' : 'Editar grupo'" [modal]="true" [style]="{ width: '520px' }">
    <div class="form-grid">
      <label for="groupName">Nombre</label>
      <input id="groupName" pInputText [(ngModel)]="formData.name" />

      <label for="groupDescription">Descripcion</label>
      <textarea id="groupDescription" pInputTextarea rows="3" [(ngModel)]="formData.description"></textarea>
    </div>

    <ng-template pTemplate="footer">
      <button pButton type="button" label="Cancelar" class="p-button-text" (click)="displayDialog = false"></button>
      <button pButton type="button" label="Guardar" (click)="saveGroup()"></button>
    </ng-template>
  </p-dialog>

  <p-dialog
    [(visible)]="showMembersDialog"
    [header]="membersTargetGroup ? ('Miembros de ' + membersTargetGroup.name) : 'Miembros'"
    [modal]="true"
    [style]="{ width: '680px' }"
  >
    <div class="members-grid">
      <label for="memberEmail">Agregar por email</label>
      <div class="member-add-row">
        <input id="memberEmail" pInputText [(ngModel)]="memberEmail" placeholder="usuario@correo.com" />
        <button pButton type="button" label="Agregar" icon="pi pi-user-plus" (click)="addMemberByEmail()"></button>
      </div>
    </div>

    <p-table [value]="usersInSelectedGroup" [rows]="6" [paginator]="true" responsiveLayout="scroll">
      <ng-template pTemplate="header">
        <tr>
          <th scope="col">Nombre</th>
          <th scope="col">Email</th>
          <th scope="col">Usuario</th>
          <th scope="col">Acciones</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-user>
        <tr>
          <td>{{ user.name }}</td>
          <td>{{ user.email }}</td>
          <td>{{ user.username }}</td>
          <td>
            <button
              pButton
              type="button"
              icon="pi pi-user-minus"
              class="p-button-rounded p-button-danger p-button-text"
              (click)="removeMember(user)"
            ></button>
          </td>
        </tr>
      </ng-template>
    </p-table>

    <ng-template pTemplate="footer">
      <button pButton type="button" label="Cerrar" class="p-button-text" (click)="showMembersDialog = false"></button>
    </ng-template>
  </p-dialog>
</div>
