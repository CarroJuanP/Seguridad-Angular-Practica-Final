<p-toast></p-toast>

<div class="login-wrapper">
  <div class="login-card">
    <div class="card-header">
      <i class="pi pi-lock header-icon"></i>
      <h2>Iniciar sesion</h2>
      <p class="mb-0">Accede y luego selecciona tu grupo de trabajo.</p>
    </div>

    <p-divider></p-divider>

    <form [formGroup]="loginForm" class="p-fluid" (ngSubmit)="login()">
      <div class="field-group">
        <label class="field-label" for="loginEmail">Correo electronico</label>
        <input id="loginEmail" pInputText formControlName="email" type="email" placeholder="tu@correo.com" class="field-input" />
        <small *ngIf="f['email'].hasError('required') && f['email'].touched" class="p-error error-text">El email es obligatorio.</small>
        <small *ngIf="f['email'].hasError('email') && f['email'].touched" class="p-error error-text">Ingresa un email valido.</small>
      </div>

      <div class="field-group">
        <label class="field-label" for="loginPassword">Contrasena</label>
        <p-password inputId="loginPassword" formControlName="password" [feedback]="false" placeholder="********" toggleMask="true"></p-password>
        <small *ngIf="f['password'].hasError('required') && f['password'].touched" class="p-error error-text">La contrasena es obligatoria.</small>
      </div>

      <button pButton type="submit" label="Ingresar" icon="pi pi-sign-in" class="w-full"></button>
    </form>

    <div class="mt-4 text-sm text-600">
      <strong>Demo:</strong>
      <div>superadmin@local / Admin@12345</div>
      <div>2023371057@uteq.edu.mx / Admin@12345</div>
    </div>
  </div>
</div>
