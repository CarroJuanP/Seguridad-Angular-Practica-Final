<!-- Formulario de autenticacion. El submit real delega el proceso a Login.login(). -->
<p-toast></p-toast>

<div class="login-wrapper">
  <div class="login-card">
    <div class="card-header">
      <button type="button" class="logo-button" (click)="onLogoClick()" aria-label="Logo de login">
        <i class="pi pi-lock header-icon"></i>
      </button>
      <h1>Iniciar sesión</h1>
      <p class="mb-0">Accede y luego selecciona tu grupo de trabajo.</p>
    </div>

    <p-divider></p-divider>

    <form [formGroup]="loginForm" class="p-fluid" (ngSubmit)="login()">
      <div class="field-group">
        <label class="field-label" for="loginIdentifier">Usuario o correo electrónico</label>
        <input id="loginIdentifier" pInputText formControlName="identifier" type="text" placeholder="usuario o tu@correo.com" class="field-input" />
        <small *ngIf="f['identifier'].hasError('required') && f['identifier'].touched" class="p-error error-text">El usuario o correo es obligatorio.</small>
      </div>

      <div class="field-group">
        <label class="field-label" for="loginPassword">Contraseña</label>
        <p-password inputId="loginPassword" formControlName="password" [feedback]="false" placeholder="********" toggleMask="true"></p-password>
        <small *ngIf="f['password'].hasError('required') && f['password'].touched" class="p-error error-text">La contraseña es obligatoria.</small>
      </div>

      <button pButton type="submit" label="Ingresar" icon="pi pi-sign-in" class="w-full" [loading]="isSubmitting" [disabled]="loginForm.invalid || isSubmitting"></button>
    </form>
  </div>
</div>
