<!-- Sidebar de navegacion para las rutas privadas. -->
<div class="sidebar p-shadow-2">
  <div class="sidebar-header mb-4">
    <div class="identity-mark">
      <i class="pi pi-user"></i>
    </div>
    <div class="identity-copy">
      <div class="identity-name">{{ currentUserName }}</div>
      <small class="identity-email">{{ currentUserEmail }}</small>
      <div class="identity-meta">
        <span class="identity-role">{{ currentRoleLabel }}</span>
        <span class="identity-workspace">{{ currentWorkspaceLabel }}</span>
      </div>
    </div>
  </div>

  <div class="menu-label">Navegacion</div>

  <nav class="sidebar-nav" aria-label="Navegacion principal">
    <a pButton routerLink="/home" class="nav-link" [class.nav-link-active]="isRouteActive('/home')">
      <i class="pi pi-home"></i>
      <span>Dashboard</span>
    </a>

    <div class="nav-section" *ngIf="canSeeAdminSection">
      <div class="menu-label menu-label-section">Admin</div>

      <a
        *ngIf="canSeeGroups"
        pButton
        routerLink="/groups"
        class="nav-link"
        [class.nav-link-active]="isRouteActive('/groups')"
      >
        <i class="pi pi-users"></i>
        <span>Grupos</span>
      </a>

      <a
        *ngIf="canSeeUsers"
        pButton
        routerLink="/users"
        class="nav-link"
        [class.nav-link-active]="isRouteActive('/users')"
      >
        <i class="pi pi-user-plus"></i>
        <span>Usuarios</span>
      </a>
    </div>

    <a pButton routerLink="/profile" class="nav-link" [class.nav-link-active]="isRouteActive('/profile')">
      <i class="pi pi-user"></i>
      <span>Mi perfil</span>
    </a>
  </nav>

  <div class="sidebar-bottom">
    <button pButton label="Cerrar sesion" icon="pi pi-sign-out" severity="danger" (click)="logout()" class="w-full p-button-rounded"></button>

    <div class="sidebar-footer">
      <i class="pi pi-info-circle"></i>
      <span>Practica2 · Angular 20</span>
    </div>
  </div>
</div>
