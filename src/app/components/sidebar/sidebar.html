<div class="sidebar p-shadow-2">
  <div class="sidebar-header text-center mb-4">
    <i class="pi pi-user" style="font-size:2rem; color:#60a5fa;"></i>
    <div class="mt-1 font-bold">{{ currentUserName }}</div>
    <small class="text-muted">{{ currentUserEmail }}</small>
  </div>

  <h3 class="text-center mb-4">Navegacion</h3>

  <button pButton label="Dashboard" icon="pi pi-home" routerLink="/home" class="w-full mb-2 p-button-rounded"></button>

  <button
    *ifHasPermission="permissions.GROUP_VIEW"
    pButton
    label="Grupos"
    icon="pi pi-users"
    routerLink="/groups"
    class="w-full mb-2 p-button-rounded"
  ></button>

  <button
    *ifHasPermission="permissions.TICKET_READ"
    pButton
    label="Tickets"
    icon="pi pi-list"
    routerLink="/tickets"
    class="w-full mb-2 p-button-rounded"
  ></button>

  <button pButton label="Mi Perfil" icon="pi pi-user" routerLink="/profile" class="w-full mb-2 p-button-rounded"></button>

  <button
    *ifHasPermission="permissions.USER_VIEW"
    pButton
    label="Gestion Usuarios"
    icon="pi pi-id-card"
    routerLink="/users"
    class="w-full mb-4 p-button-rounded"
  ></button>

  <hr style="margin:1rem 0; border-color:#334155;">

  <button pButton label="Cerrar Sesion" icon="pi pi-sign-out" severity="danger" (click)="logout()" class="w-full p-button-rounded"></button>
</div>
